{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="hero" style="padding: 2rem;">
    <div class="hero-text" style="text-align: center; margin: 0 auto;">
        <h1>🔐 <span>Welcome Back</span></h1>
        <p>Log in to continue your coding journey</p>
    </div>
</div>

<div style="max-width: 450px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 40px; box-shadow: 0 15px 0 #9B7EDE; border: 3px solid #FFB347;">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e5f4b;">
                <i class="fas fa-user"></i> Username
            </label>
            <input type="text" name="username" placeholder="Enter your username" required
                   style="width: 100%; padding: 0.8rem; border: 2px solid #FFB347; border-radius: 50px; font-family: inherit;">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e5f4b;">
                <i class="fas fa-lock"></i> Password
            </label>
            <input type="password" name="password" placeholder="Enter your password" required
                   style="width: 100%; padding: 0.8rem; border: 2px solid #FFB347; border-radius: 50px; font-family: inherit;">
        </div>

        <button type="submit" class="big-btn" style="width: 100%; font-size: 1.2rem; margin-top: 0.5rem;">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
    </form>

    <div style="text-align: center; margin-top: 1.5rem;">
        <p>Don't have an account? <a href="{{ url_for('signup') }}" style="color: #FFB347; font-weight: 600;">Sign up here</a></p>
        <p style="font-size: 0.8rem; margin-top: 1rem; color: #6c757d;">Demo account: username "test" / password "test123"</p>
    </div>
</div>
{% endblock %}
