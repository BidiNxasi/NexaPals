{% extends "base.html" %}

{% block title %}Playground{% endblock %}

{% block content %}
<div class="hero" style="padding: 1rem 2rem;">
    <h1>🎮 Code Playground</h1>
    <p>Write HTML, CSS, and JavaScript – see live results!</p>
</div>

<div class="playground-container" style="display: flex; flex-wrap: wrap; gap: 1rem; padding: 2rem; background: #f0f5ff;">
    <!-- Editor Panel -->
    <div style="flex: 1; min-width: 300px;">
        <h3>📝 HTML</h3>
        <textarea id="htmlEditor" rows="8" style="width:100%; font-family: monospace; padding: 0.8rem; border-radius: 16px; border: 2px solid #FFB347;">&lt;h1&gt;Hello, Nexa Pals!&lt;/h1&gt;
&lt;p&gt;Change this code and see the magic.&lt;/p&gt;
&lt;button id="myBtn"&gt;Click Me&lt;/button&gt;</textarea>
        
        <h3 style="margin-top: 1rem;">🎨 CSS</h3>
        <textarea id="cssEditor" rows="6" style="width:100%; font-family: monospace; padding: 0.8rem; border-radius: 16px; border: 2px solid #FFB347;">h1 { color: #FFB347; font-family: sans-serif; }
button { background: #9B7EDE; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
button:hover { background: #7B5EC0; }</textarea>
        
        <h3 style="margin-top: 1rem;">⚡ JavaScript</h3>
        <textarea id="jsEditor" rows="6" style="width:100%; font-family: monospace; padding: 0.8rem; border-radius: 16px; border: 2px solid #FFB347;">document.getElementById('myBtn')?.addEventListener('click', () => {
    alert('You clicked the button! 🎉');
});</textarea>
        
        <div style="margin: 1rem 0; display: flex; gap: 0.8rem; flex-wrap: wrap;">
            <button class="big-btn" style="font-size: 1rem; padding: 0.6rem 1.2rem;" onclick="runCode()">▶ Run Code</button>
            <button class="big-btn" style="font-size: 1rem; padding: 0.6rem 1.2rem; background:#5D9BEC;" onclick="saveProject()">💾 Save Project</button>
            <select id="projectSelect" style="padding: 0.6rem; border-radius: 30px; border: 2px solid #FFB347;" onchange="loadProject()">
                <option value="">-- Load saved project --</option>
                {% for proj in user_projects %}
                <option value="{{ proj.id }}">{{ proj.title }}</option>
                {% endfor %}
            </select>
            <input type="text" id="projectTitle" placeholder="Project title" style="padding: 0.6rem; border-radius: 30px; border: 2px solid #FFB347; flex: 1; min-width: 150px;">
        </div>
    </div>
    
    <!-- Preview Panel -->
    <div style="flex: 1; min-width: 300px;">
        <h3>👀 Live Preview</h3>
        <iframe id="preview" style="width:100%; height: 550px; border: 3px solid #FFB347; border-radius: 20px; background: white;"></iframe>
    </div>
</div>

<script>
    window.addEventListener('load', function() {
        // Load template data passed from create.html via sessionStorage
        const templateHtml = sessionStorage.getItem('templateHtml');
        if (templateHtml) {
            const htmlEditor = document.getElementById('htmlEditor');
            const cssEditor  = document.getElementById('cssEditor');
            const jsEditor   = document.getElementById('jsEditor');
            const titleInput = document.getElementById('projectTitle');
            if (htmlEditor) {
                htmlEditor.value = templateHtml;
                cssEditor.value  = sessionStorage.getItem('templateCss')  || '';
                jsEditor.value   = sessionStorage.getItem('templateJs')   || '';
                titleInput.value = sessionStorage.getItem('templateName') || 'Starter Project';
                sessionStorage.clear();
            }
        }
        // Always auto-run so the preview is live immediately
        if (typeof runCode === 'function') runCode();
    });
</script>
{% endblock %}
