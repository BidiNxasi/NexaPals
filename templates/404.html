{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="hero" style="padding: 3rem 2rem; text-align: center; flex-direction: column;">
    <div class="hero-avatar" style="margin: 0 auto 1.5rem;">
        <i class="fas fa-map-signs"></i>
    </div>
    <h1>Oops! <span>404</span></h1>
    <p>This page wandered off and got lost. Let's get you back on track!</p>
    <a href="{{ url_for('index') }}" class="big-btn" style="display: inline-block; margin-top: 1.5rem; text-decoration: none;">
        <i class="fas fa-home"></i> Back to Home
    </a>
</div>
{% endblock %}
